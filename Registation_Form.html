<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration_Form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form action="#" method="POST">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>


        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>


        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        
        <label for="confirm_password">Confirm Password:</label><br>
        <input type="password" id="confirm_password" name="confirm_password" required><br><br>


        <label for="gender">Gender:</label><br><br>
        <input type="radio" id="male" name="gender" value="male" required><label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female" required><label for="female">Female</label><br>
        <input type="radio" id="other" name="gender" value="other" required><label for="other">Other</label><br><br>


        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>


        <label for="department">Select Department:</label><br>
        <select id="department" name="department">
        <option value="cse">CSE (Computer Science & Engineering)</option>
        <option value="eee">EEE (Electrical & Electronic Engineering)</option>
        <option value="bba">BBA (Business Administration)</option>
    </select>
    <br><br>


    <label>
    <input type="checkbox" name="terms" required>
    I agree to the Terms and Conditions
    </label><br><br>

    <input type="submit" value="Register">
    </form>

</body>
</html>
